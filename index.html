<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />
    <title>Sam-Lemon</title>
  </head>
  <body>
    <div class="sparkling-bg"></div>

    <div id="welcome-card" class="welcome-card">
      <div class="content">
        <div class="border">
          <p id="welcome-portfolio">
            <span class="glow-text">Welcome</span>
            <br />
            <span class="glow-text">to</span>
            <span class="glow-text">My</span>
            <br />
            <span class="glow-text">Portfolio</span>
            <span id="click-here" class="glow-text">Click Here</span>
          </p>
        </div>
      </div>
    </div>

    <div id="shapes" class="shapes">
      <img
        class="circle"
        src="./images/CircleTriSquig.png"
        alt="Pink circle, purple triangle, two yellow squiggles"
        width="200px"
      />
      <img
        class="square"
        src="./images/SquareCirSquig.png"
        alt="Green square, yellow circle, two blue squiggles"
        width="200px"
      />
      <img
        class="triangle"
        src="./images/TriangleSquCir.png"
        alt="Yellow triangle, pink square, blue circle"
        width="250px"
      />
    </div>

    <script src="index.js"></script>
  </body>
</html>
