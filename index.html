<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />
    <title>Sam-Lemon</title>
  </head>
  <body>
    <div class="sparkling-bg"></div>

    <section id="welcome-card" class="welcome-card">
      <div class="content">
        <div class="chasing-border">
          <p id="welcome-portfolio">
            <span class="glow-text">Welcome</span>
            <br />
            <span class="glow-text">to My</span>
            <br />
            <span class="glow-text">Portfolio</span>
            <span id="click-here" class="glow-text">click here</span>
          </p>
        </div>
      </div>
    </section>

    <section id="shapes" class="shapes">
      <button class="image-button">
        <img
          class="circle shape"
          id="toggle-about-me"
          src="./images/CircleTriSquig.png"
          alt="Toggle About Me"
          width="200px"
          onclick="viewAboutMe()"
        />
      </button>
      <button class="image-button">
        <img
          class="square shape"
          id="toggle-projects"
          src="./images/SquareCirSquig.png"
          alt="Green square, yellow circle, two blue squiggles"
          width="200px"
        />
      </button>
      <button class="image-button">
        <img
          class="triangle shape"
          id="toggle-contact"
          src="./images/TriangleSquCir.png"
          alt="Yellow triangle, pink square, blue circle"
          width="250px"
        />
      </button>
    </section>

    <section id="about-me">
      <h2>About Me</h2>
      <p>LoremIpsumLoremIpsumLoremIpsumLoremIpsumLoremIpsumLoremIpsum</p>
    </section>

    <script src="index.js"></script>
  </body>
</html>
